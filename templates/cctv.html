<!DOCTYPE html>

<html>

<head>

<title>Live CCTV</title>

<style>

body{

font-family:Arial,sans-serif;

background:#f4f7fb;

padding:30px;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

}

.title{

font-size:38px;

font-weight:bold;

}

.status{

background:#10b981;

color:white;

padding:12px 20px;

border-radius:15px;

}

.video-box{

background:white;

padding:20px;

border-radius:25px;

box-shadow:0 10px 25px rgba(0,0,0,0.08);

}

img{

width:100%;

border-radius:20px;

}

.info{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:20px;

margin-top:25px;

}

.card{

background:white;

padding:25px;

border-radius:25px;

box-shadow:0 10px 25px rgba(0,0,0,0.08);

text-align:center;

}

.big{

font-size:35px;

font-weight:bold;

margin-bottom:10px;

}

</style>

</head>

<body>

<div class="header">

<div class="title">

🎥 Live CCTV Monitoring

</div>

<div class="status">

🟢 Connected

</div>

</div>

<div class="video-box">

<img src="/cctv_feed">

</div>

<div class="info">

<div class="card">

<div class="big">

📱

</div>

iPhone Camera

</div>

<div class="card">

<div class="big">

Live

</div>

AI Monitoring

</div>

<div class="card">

<div class="big">

24/7

</div>

Surveillance

</div>

</div>

</body>

</html>
