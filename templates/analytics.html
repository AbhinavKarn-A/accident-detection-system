<!DOCTYPE html>

<html>

<head>

<title>Analytics</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#f4f7fb;

padding:30px;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;

}

.title{

font-size:38px;

font-weight:bold;

}

.status{

background:#10b981;

color:white;

padding:12px 20px;

border-radius:15px;

font-weight:bold;

}

.stats{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:20px;

margin-bottom:30px;

}

.card{

background:white;

padding:25px;

border-radius:25px;

box-shadow:0 10px 25px rgba(0,0,0,0.08);

text-align:center;

}

.number{

font-size:40px;

font-weight:bold;

}

.label{

margin-top:10px;

color:#666;

}

.chart-box{

background:white;

padding:30px;

border-radius:25px;

box-shadow:0 10px 25px rgba(0,0,0,0.08);

}

canvas{

height:450px !important;

}

</style>

</head>

<body>

<div class="header">

<div class="title">

📊 AI Traffic Analytics

</div>

<div class="status">

🟢 Live System

</div>

</div>


<div class="stats">

<div class="card">

<div class="number">

24

</div>

<div class="label">

🚗 Vehicles

</div>

</div>


<div class="card">

<div class="number">

3

</div>

<div class="label">

⚠️ Warnings

</div>

</div>


<div class="card">

<div class="number">

1

</div>

<div class="label">

🚨 Accidents

</div>

</div>


<div class="card">

<div class="number">

96%

</div>

<div class="label">

🎯 AI Accuracy

</div>

</div>

</div>


<div class="chart-box">

<canvas id="trafficChart"></canvas>

</div>


<script>

new Chart(

document.getElementById(

'trafficChart'

),

{

type:'line',

data:{

labels:[

'8 AM',

'9 AM',

'10 AM',

'11 AM',

'12 PM',

'1 PM'

],

datasets:[

{

label:'Vehicles',

data:[

12,

18,

25,

32,

27,

20

],

borderWidth:4,

fill:true

},

{

label:'Warnings',

data:[

0,

1,

1,

2,

3,

1

],

borderWidth:4,

fill:true

},

{

label:'Accidents',

data:[

0,

0,

0,

1,

1,

1

],

borderWidth:4,

fill:true

}

]

},

options:{

responsive:true

}

}

)

</script>

</body>

</html>
