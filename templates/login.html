<!DOCTYPE html>

<html>

<head>

<title>AI Accident Detection System Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(
135deg,
#f5f7fa,
#dfe9f3
);

}

.container{

width:420px;

background:white;

padding:50px;

border-radius:30px;

box-shadow:
0 20px 50px rgba(0,0,0,0.15);

text-align:center;

}

.logo{

font-size:70px;

margin-bottom:10px;

}

h1{

font-size:32px;

margin-bottom:10px;

color:#111;

}

.subtitle{

color:#666;

margin-bottom:40px;

}

.input-box{

margin-bottom:20px;

}

input{

width:100%;

padding:18px;

border:none;

outline:none;

border-radius:15px;

background:#f3f5f7;

font-size:16px;

}

input:focus{

border:2px solid #4caf50;

}

button{

width:100%;

padding:18px;

border:none;

border-radius:15px;

font-size:18px;

font-weight:bold;

background:#111827;

color:white;

cursor:pointer;

transition:0.3s;

}

button:hover{

transform:translateY(-3px);

}

.credentials{

margin-top:25px;

color:#888;

font-size:14px;

}

.footer{

margin-top:25px;

font-size:14px;

color:#999;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

🚦

</div>

<h1>

AI Accident Detection System

</h1>

<p class="subtitle">



</p>

<form method="POST">

<div class="input-box">

<input
type="text"
name="username"
placeholder="Username"
required>

</div>

<div class="input-box">

<input
type="password"
name="password"
placeholder="Password"
required>

</div>

<button>

Login

</button>

</form>

<div class="credentials">

Demo 

<br><br>



<br>


</div>

<div class="footer">

AI Powered Traffic Safety Monitoring

</div>

</div>

</body>

</html>
